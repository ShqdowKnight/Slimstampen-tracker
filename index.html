<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClassPulse – Teacher Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #08090c;
      --surface: #10121a;
      --surface2: #181b26;
      --border: #ffffff0f;
      --accent: #7c6aff;
      --accent2: #4ade80;
      --danger: #f87171;
      --text: #e8eaf0;
      --muted: #ffffff45;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LOGIN ─── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    #loginScreen::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, #7c6aff15 0%, transparent 65%);
      pointer-events: none;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%; max-width: 420px;
    }

    .brand { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
    .brand span { color: var(--accent); }
    .brand-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .login-btn:hover { background: #6a57f0; }
    .login-btn:active { transform: scale(0.98); }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    /* ─── DASHBOARD ─── */
    #dashboard { display: none; position: relative; z-index: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .topbar-brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .topbar-brand span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }

    .class-badge {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      background: #7c6aff18;
      border: 1px solid #7c6aff30;
      border-radius: 6px;
      padding: 5px 10px;
    }

    .logout-btn {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { color: var(--text); border-color: #ffffff25; }

    .main { padding: 32px; max-width: 1100px; margin: 0 auto; }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
    .page-title small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0;
      margin-bottom: 4px;
    }

    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .search-box { position: relative; }
    .search-box input {
      padding: 10px 16px 10px 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      width: 240px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #ffffff25; }
    .search-box input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
    }

    .class-select {
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    /* Date range controls */
    .date-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .date-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .date-input {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .date-input:focus { border-color: var(--accent); }

    .range-btn {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .range-btn:hover, .range-btn.active { color: var(--accent); border-color: #7c6aff40; background: #7c6aff10; }

    .refresh-btn {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .refresh-btn:hover { color: var(--text); border-color: #ffffff25; }

    /* ─── STATS ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
    }
    .stat-value.green { color: var(--accent2); }
    .stat-value.purple { color: var(--accent); }

    /* ─── TABLE ─── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }
    th:hover { color: var(--text); }
    th.right { text-align: right; }
    th.sorted { color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #ffffff04; }

    td { padding: 15px 20px; font-size: 14px; }

    .rank {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      min-width: 30px;
    }
    .rank.top { color: var(--accent); font-weight: 600; }

    .student-name { font-weight: 600; font-size: 15px; }
    .student-id { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

    .time-cell { text-align: right; }
    .time-num {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--accent2);
    }
    .time-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .bar-wrap {
      width: 120px;
      height: 5px;
      background: #ffffff0a;
      border-radius: 99px;
      margin-top: 6px;
      margin-left: auto;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), #86efac);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .last-seen { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-pill.online { background: #4ade8018; color: var(--accent2); border: 1px solid #4ade8030; }
    .status-pill.offline { background: #ffffff08; color: var(--muted); border: 1px solid var(--border); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .online .status-dot { animation: pulse 2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 14px; }
    .empty-state p { font-size: 15px; }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent2);
      background: #4ade8012;
      border: 1px solid #4ade8025;
      border-radius: 99px;
      padding: 4px 10px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.5s infinite;
    }

    .ticks-col {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand">Class<span>Pulse</span></div>
    <div class="brand-sub">Teacher Dashboard · Sign In</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="teacher@school.be" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" />
    </div>
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ─── DASHBOARD ─── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">Class<span>Pulse</span></div>
    <div class="topbar-right">
      <div class="live-badge"><div class="live-dot"></div> Live</div>
      <div class="class-badge" id="topbarEmail">–</div>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">
        <small>Engagement Tracker</small>
        Student Leaderboard
      </div>
      <div class="controls">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search student..." />
        </div>
        <select class="class-select" id="classFilter">
          <option value="">All classes</option>
        </select>
      </div>
    </div>

    <!-- Date range row -->
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;">
      <span class="date-label">Range:</span>
      <button class="range-btn active" id="btnToday" onclick="setRange('today')">Today</button>
      <button class="range-btn" id="btnWeek" onclick="setRange('week')">This week</button>
      <button class="range-btn" id="btnAll" onclick="setRange('all')">All time</button>
      <span class="date-label" style="margin-left:8px;">From:</span>
      <input type="date" class="date-input" id="dateFrom" />
      <span class="date-label">To:</span>
      <input type="date" class="date-input" id="dateTo" />
      <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Students tracked</div>
        <div class="stat-value purple" id="statTotal">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active now (5 min)</div>
        <div class="stat-value green" id="statActive">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top active time</div>
        <div class="stat-value" id="statTop">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg active time</div>
        <div class="stat-value" id="statAvg">–</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Student</th>
            <th>Class</th>
            <th>Status</th>
            <th onclick="sortBy('last_seen')">Last seen</th>
            <th onclick="sortBy('active_seconds')" class="right sorted" id="th_active_seconds">Active time ↓</th>
            <th class="right">Total ticks</th>
          </tr>
        </thead>
        <tbody id="studentTable">
          <tr><td colspan="7">
            <div class="empty-state">
              <div class="icon">📡</div>
              <p>Loading student data…</p>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://debrjjsbsfznrbauloai.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlYnJqanNic2Z6bnJiYXVsb2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTY5NzYsImV4cCI6MjA5NDE5Mjk3Nn0.1PT5yEpCdkoxxigPsXb5m8VZ1mWQFe67dZzptpoxCzE';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TICK_SECONDS = 10; // each active tick = 10 seconds

let allStudents = [];
let sortKey = 'active_seconds';
let sortDir = -1; // -1 = desc

// ─── DATE RANGE ───────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }

function setRange(range) {
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  const now = new Date();
  if (range === 'today') {
    document.getElementById('btnToday').classList.add('active');
    document.getElementById('dateFrom').value = todayStr();
    document.getElementById('dateTo').value = todayStr();
  } else if (range === 'week') {
    document.getElementById('btnWeek').classList.add('active');
    const mon = new Date(now);
    mon.setDate(now.getDate() - now.getDay() + 1);
    document.getElementById('dateFrom').value = mon.toISOString().split('T')[0];
    document.getElementById('dateTo').value = todayStr();
  } else {
    document.getElementById('btnAll').classList.add('active');
    document.getElementById('dateFrom').value = '2020-01-01';
    document.getElementById('dateTo').value = todayStr();
  }
  loadStudents();
}

// Init dates to today
document.getElementById('dateFrom').value = todayStr();
document.getElementById('dateTo').value = todayStr();

// ─── AUTH ─────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  showDashboard(data.session);
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
});

sb.auth.getSession().then(({ data }) => {
  if (data.session) showDashboard(data.session);
});

function showDashboard(session) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('topbarEmail').textContent = session.user.email;
  loadStudents();
  setInterval(loadStudents, 30000);
}

// ─── LOAD DATA ────────────────────────────────────────────
async function loadStudents() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;

  // Fetch ALL ticks in the date range (active or not — we count active ones below)
  let query = sb
    .from('activity_ticks')
    .select('student_id, student_name, class_code, active, had_keypress, recorded_at')
    .gte('recorded_at', from + 'T00:00:00Z')
    .lte('recorded_at', to + 'T23:59:59Z');

  const { data, error } = await query;

  if (error) { console.error('Error loading:', error); return; }

  // Aggregate per student
  const map = {};
  data.forEach(tick => {
    const key = tick.student_id;
    if (!map[key]) {
      map[key] = {
        student_id: tick.student_id,
        student_name: tick.student_name,
        class_code: tick.class_code,
        active_ticks: 0,   // ticks where active=true
        total_ticks: 0,    // all ticks
        last_seen: null
      };
    }
    map[key].total_ticks++;
    if (tick.active) map[key].active_ticks++;

    const t = new Date(tick.recorded_at);
    if (!map[key].last_seen || t > new Date(map[key].last_seen)) {
      map[key].last_seen = tick.recorded_at;
    }
  });

  // Convert active ticks → seconds → minutes
  allStudents = Object.values(map).map(s => ({
    ...s,
    active_seconds: s.active_ticks * TICK_SECONDS
  }));

  // Populate class filter
  const classes = [...new Set(allStudents.map(s => s.class_code))].sort();
  const classFilter = document.getElementById('classFilter');
  const current = classFilter.value;
  classFilter.innerHTML = '<option value="">All classes</option>';
  classes.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    if (c === current) opt.selected = true;
    classFilter.appendChild(opt);
  });

  renderTable();
  updateStats();
}

// ─── FORMAT TIME ──────────────────────────────────────────
function formatTime(seconds) {
  if (seconds < 60) return `${seconds}s`;
  if (seconds < 3600) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return s > 0 ? `${m}m ${s}s` : `${m}m`;
  }
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

// ─── SORT ─────────────────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) { sortDir *= -1; }
  else { sortKey = key; sortDir = -1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const el = document.getElementById('th_' + key);
  if (el) el.classList.add('sorted');
  renderTable();
}

// ─── RENDER ───────────────────────────────────────────────
function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const classFilter = document.getElementById('classFilter').value;
  const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000);

  let filtered = allStudents.filter(s => {
    const matchSearch = !search ||
      s.student_name.toLowerCase().includes(search) ||
      s.student_id.toLowerCase().includes(search);
    const matchClass = !classFilter || s.class_code === classFilter;
    return matchSearch && matchClass;
  });

  // Sort
  filtered.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'last_seen') { av = av ? new Date(av).getTime() : 0; bv = bv ? new Date(bv).getTime() : 0; }
    return sortDir * (bv - av);
  });

  const maxSeconds = filtered.length > 0 ? Math.max(...filtered.map(s => s.active_seconds), 1) : 1;
  const tbody = document.getElementById('studentTable');

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>No students found for this period</p>
      </div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map((s, i) => {
    const pct = Math.round((s.active_seconds / maxSeconds) * 100);
    const isOnline = s.last_seen && new Date(s.last_seen) > fiveMinAgo;
    const lastSeenStr = s.last_seen ? timeAgo(new Date(s.last_seen)) : 'never';
    const rankClass = i < 3 ? 'top' : '';
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1);

    return `
      <tr>
        <td><div class="rank ${rankClass}">${rankLabel}</div></td>
        <td>
          <div class="student-name">${escHtml(s.student_name)}</div>
          <div class="student-id">${escHtml(s.student_id)}</div>
        </td>
        <td><span style="font-family:var(--mono);font-size:12px;color:var(--accent)">${escHtml(s.class_code)}</span></td>
        <td>
          <span class="status-pill ${isOnline ? 'online' : 'offline'}">
            <span class="status-dot"></span>
            ${isOnline ? 'Active' : 'Offline'}
          </span>
        </td>
        <td><div class="last-seen">${lastSeenStr}</div></td>
        <td class="time-cell">
          <div class="time-num">${formatTime(s.active_seconds)}</div>
          <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
          <div class="time-sub">${s.active_ticks} active ticks</div>
        </td>
        <td class="time-cell">
          <div class="ticks-col">${s.total_ticks}</div>
        </td>
      </tr>
    `;
  }).join('');
}

// ─── STATS ────────────────────────────────────────────────
function updateStats() {
  const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000);
  const activeNow = allStudents.filter(s => s.last_seen && new Date(s.last_seen) > fiveMinAgo).length;
  const times = allStudents.map(s => s.active_seconds);
  const avg = times.length ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : 0;
  const top = times.length ? Math.max(...times) : 0;

  document.getElementById('statTotal').textContent = allStudents.length;
  document.getElementById('statActive').textContent = activeNow;
  document.getElementById('statTop').textContent = formatTime(top);
  document.getElementById('statAvg').textContent = formatTime(avg);
}

// ─── HELPERS ──────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function timeAgo(date) {
  const diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

// ─── EVENTS ───────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('classFilter').addEventListener('change', renderTable);
document.getElementById('dateFrom').addEventListener('change', loadStudents);
document.getElementById('dateTo').addEventListener('change', loadStudents);
document.getElementById('refreshBtn').addEventListener('click', () => {
  document.getElementById('refreshBtn').textContent = '↻ Loading…';
  loadStudents().finally(() => {
    document.getElementById('refreshBtn').textContent = '↻ Refresh';
  });
});
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
